<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Initiate Return · Aurelia Retail Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Inter:wght@400;500;600&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../assets/css/console.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
</head>
<body>

<div class="app">
  <aside id="sidebar"></aside>

  <main class="main">
    <header id="topbar"></header>

    <section class="content">
      <a href="returns.html" class="back-link">&larr; Back to returns</a>

      <div class="form-wrap">
      <div class="card">
        <div class="card-h"><div><h2>New return</h2><p>Refund is auto-calculated from the order total.</p></div></div>
        <div class="card-b">
          <div id="form-error" class="alert alert-error" style="margin-bottom:18px;display:none;"></div>

          <form id="return-form">
            <div class="field">
              <label>Order ID</label>
              <input type="number" name="orderId" placeholder="1" required/>
            </div>
            <div class="field">
              <label>Return reason</label>
              <textarea name="returnReason" placeholder="Damaged on arrival…"></textarea>
            </div>
            <div class="field">
              <label>Request date</label>
              <input type="date" name="requestDate"/>
              <span class="hint">Leave blank to use today. Must be within the 30-day window.</span>
            </div>
            <div class="form-actions">
              <a href="returns.html" class="btn btn-ghost">Cancel</a>
              <button type="submit" class="btn btn-primary">Initiate return</button>
            </div>
          </form>
        </div>
      </div>
      </div>
    </section>
  </main>
</div>

<div class="toast-wrap"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="return-form.js"></script>
</body>
</html>
