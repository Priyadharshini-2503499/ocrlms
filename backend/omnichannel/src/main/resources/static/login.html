<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in · Aurelia Retail Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Inter:wght@400;500;600&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="assets/css/console.css"/>
  <link rel="stylesheet" href="assets/css/components.css"/>
</head>
<body>

<div class="picker-shell">
  <div class="picker-head">
    <div class="ring serif">A</div>
    <p class="eyebrow">Aurelia Retail</p>
    <h1 class="serif">Sign in to the console</h1>
    <p>Enter your credentials. Accounts are provisioned by your administrator.</p>
  </div>

  <div class="card" style="max-width:420px;margin:0 auto;width:100%;">
    <div class="card-b">
      <form id="login-form" novalidate>
        <div id="form-error" class="alert alert-error" style="margin-bottom:18px;display:none;"></div>

        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" autocomplete="username" placeholder="e.g. admin, storemanager, merchandiser" required/>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password"
                 autocomplete="current-password" placeholder="Enter your password" required/>
        </div>

        <button class="btn btn-primary btn-block" id="submit-btn" type="submit">Sign in</button>
      </form>
    </div>
  </div>
</div>

<div class="toast-wrap"></div>
<script type="module" src="login.js"></script>
</body>
</html>
