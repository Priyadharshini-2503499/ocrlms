<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Place Order · Aurelia Retail Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Inter:wght@400;500;600&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../assets/css/console.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
</head>
<body>

<div class="app">
  <aside id="sidebar"></aside>

  <main class="main">
    <header id="topbar"></header>

    <section class="content">
      <a href="orders.html" class="back-link">&larr; Back to orders</a>

      <div class="form-wrap form-wrap--wide">
      <div class="card">
        <div class="card-h"><div><h2>New order</h2><p>The total is calculated from current product prices.</p></div></div>
        <div class="card-b">
          <div id="form-error" class="alert alert-error" style="margin-bottom:18px;display:none;"></div>

          <form id="order-form">
            <div class="form-row">
              <div class="field">
                <label>Customer ID</label>
                <input type="number" name="customerId" placeholder="1" required/>
              </div>
              <div class="field">
                <label>Channel</label>
                <select name="orderChannel">
                  <option value="ONLINE">ONLINE</option>
                  <option value="INSTORE">INSTORE</option>
                  <option value="MOBILE">MOBILE</option>
                </select>
              </div>
            </div>

            <label class="auria-label" style="display:block;margin-bottom:8px;">Items</label>

            <div class="table-wrap" style="border:1px solid var(--line);border-radius:12px;">
              <table>
                <thead>
                  <tr><th style="width:60%;">Product</th><th>Quantity</th><th></th></tr>
                </thead>
                <tbody id="item-rows"></tbody>
              </table>
            </div>

            <button type="button" id="add-item" class="btn btn-ghost btn-sm" style="margin-top:12px;">+ Add item</button>

            <div class="field" style="margin-top:18px;max-width:380px;">
              <label>Coupon code <span class="hint">(optional)</span></label>
              <div style="display:flex; gap:10px; align-items:stretch;">
                <input type="text" name="couponCode" placeholder="e.g. WELCOME10" autocomplete="off" style="flex:1;"/>
                <button type="button" id="apply-coupon" class="btn btn-ghost" style="flex:0 0 auto;">Apply</button>
              </div>
              <span class="hint">Preview the discount before placing the order.</span>
              <div id="coupon-result" class="alert" style="margin-top:12px;display:none;"></div>
            </div>

            <div class="form-actions" style="margin-top:18px;">
              <a href="orders.html" class="btn btn-ghost">Cancel</a>
              <button type="submit" class="btn btn-primary">Place order</button>
            </div>
          </form>
        </div>
      </div>
      </div>
    </section>
  </main>
</div>

<div class="toast-wrap"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="place-order.js"></script>
</body>
</html>
