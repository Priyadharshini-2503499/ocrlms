<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Users · Aurelia Retail Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Inter:wght@400;500;600&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../assets/css/console.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
</head>
<body>

<div class="app">
  <aside id="sidebar"></aside>

  <main class="main">
    <header id="topbar"></header>

    <section class="content">
      <div class="toolbar">
        <div>
          <p class="eyebrow">Administration</p>
          <h2 class="serif" style="font-size:22px;">User accounts</h2>
        </div>
      </div>

      <div class="grid" style="grid-template-columns:380px 1fr;gap:20px;align-items:start;">

        <!-- Create user -->
        <div class="card">
          <div class="card-h"><div><h2>Create a user</h2><p>Provision a new account and role.</p></div></div>
          <div class="card-b">
            <form id="user-form" novalidate>
              <div id="form-error" class="alert alert-error" style="margin-bottom:18px;display:none;"></div>

              <div class="field">
                <label for="fullName">Full name</label>
                <input id="fullName" name="fullName" placeholder="Jordan Mehta" required/>
              </div>

              <div class="field">
                <label for="username">Username</label>
                <input id="username" name="username" autocomplete="off" placeholder="jmehta" required/>
              </div>

              <div class="field">
                <label for="password">Temporary password</label>
                <input id="password" name="password" type="password"
                       autocomplete="new-password" placeholder="At least 6 characters" required/>
              </div>

              <div class="field">
                <label for="role">Role</label>
                <select id="role" name="role" required>
                  <option value="" selected disabled>Choose a role…</option>
                  <option value="ADMIN">Admin</option>
                  <option value="MERCHANDISER">Merchandiser</option>
                  <option value="STORE_MANAGER">Store Manager</option>
                  <option value="CUSTOMER_SERVICE">Customer Service</option>
                  <option value="MARKETING_MANAGER">Marketing Manager</option>
                </select>
              </div>

              <button class="btn btn-primary btn-block" id="submit-btn" type="submit">+ Create user</button>
            </form>
          </div>
        </div>

        <!-- Existing users -->
        <div class="card">
          <div class="card-h"><div><h2>All users</h2><p>Provisioned accounts.</p></div></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>User</th>
                  <th>Username</th>
                  <th>Role</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="rows">
                <tr><td colspan="4"><div class="empty">Loading…</div></td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </section>
  </main>
</div>

<div class="toast-wrap"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="users.js"></script>
</body>
</html>
