<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customers · Aurelia Retail Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Inter:wght@400;500;600&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../assets/css/console.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
</head>
<body>

<div class="app">
  <aside id="sidebar"></aside>

  <main class="main">
    <header id="topbar"></header>

    <section class="content">
      <div class="toolbar">
        <div>
          <p class="eyebrow">Customer Care</p>
          <h2 class="serif" style="font-size:22px;">All customers</h2>
        </div>
        <a href="customer-form.html" class="btn btn-primary">+ Register customer</a>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Customer</th>
                <th>Contact</th>
                <th>Points</th>
                <th>Tier</th>
                <th style="text-align:right;">Action</th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr><td colspan="5"><div class="empty">Loading…</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</div>

<div class="toast-wrap"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="customers.js"></script>
</body>
</html>
