<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Product · Aurelia Retail Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Inter:wght@400;500;600&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../assets/css/console.css"/>
  <link rel="stylesheet" href="../assets/css/components.css"/>
</head>
<body>

<div class="app">
  <aside id="sidebar"></aside>

  <main class="main">
    <header id="topbar"></header>

    <section class="content">
      <a href="products.html" class="back-link">&larr; Back to catalog</a>

      <div class="form-wrap">
      <div class="card">
        <div class="card-h">
          <div>
            <h2>New product</h2>
            <p>SKU, category and base price.</p>
          </div>
        </div>
        <div class="card-b">
          <div id="form-error" class="alert alert-error" style="margin-bottom:18px;display:none;"></div>

          <form id="product-form">
            <div class="form-row">
              <div class="field">
                <label>SKU code</label>
                <input type="text" name="skuCode" placeholder="SKU-1001" required/>
              </div>
              <div class="field">
                <label>Category</label>
                <input type="text" name="category" placeholder="Footwear" required/>
              </div>
            </div>

            <div class="field">
              <label>Product name</label>
              <input type="text" name="productName" placeholder="Trail Runner Shoe" required/>
            </div>

            <div class="form-row">
              <div class="field">
                <label>Base price</label>
                <div class="input-group">
                  <span class="addon">₹</span>
                  <input type="number" step="0.01" min="0" name="basePrice" placeholder="0.00" required/>
                </div>
              </div>
              <div class="field">
                <label>Status</label>
                <select name="productStatus">
                  <option value="ACTIVE">ACTIVE</option>
                  <option value="DISCONTINUED">DISCONTINUED</option>
                </select>
              </div>
            </div>

            <div class="form-actions">
              <a href="products.html" class="btn btn-ghost">Cancel</a>
              <button type="submit" class="btn btn-primary">Save product</button>
            </div>
          </form>
        </div>
      </div>
      </div>
    </section>
  </main>
</div>

<div class="toast-wrap"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="product-form.js"></script>
</body>
</html>
