name: CI
on:
  pull_request:
    branches: [ main, develop ]
jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build backend
        run: cd backend/omnichannel && ./mvnw -B clean verify